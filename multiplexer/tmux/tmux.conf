# =========================
# 基础
# =========================
set -g default-shell /bin/zsh
set -g extended-keys on
set -g default-terminal "tmux-256color" # Note: If remote hosts do not support tmux-256color (e.g. ancient CentOS), TERM can be overridden to xterm-256color in remote ~/.zshrc. See ~/.ssh/config.d/dsliam for details.
set -g terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc,xterm-kitty:Tc,alacritty:Tc,wezterm:Tc"
set -gu terminal-features
set -as terminal-features ",xterm-ghostty:RGB,xterm-kitty:RGB,alacritty:RGB,wezterm:RGB"
set -g allow-passthrough on

# =========================
# 插件 (TPM)
# =========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

# =========================
# 前缀键
# =========================
set -g prefix C-a

# =========================
# 快捷键
# =========================
unbind %
bind-key \\ split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 配合 vim-tmux-navigator（Opt+h/j/k/l 穿透到 vim，避免与 Backspace/C-l 等冲突）
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'M-h' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-h } { select-pane -L } }
bind -n 'M-j' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-j } { select-pane -D } }
bind -n 'M-k' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-k } { select-pane -U } }
bind -n 'M-l' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-l } { select-pane -R } }
bind -n 'M-\' if -F "#{pane_current_command}" { switch-client -n } { select-pane -l }

# =========================
# 缩放 & 窗口
# =========================
bind z resize-pane -Z
bind c new-window -c "#{pane_current_path}"
bind y new-window -n yazi -c "#{pane_current_path}" "$HOME/.local/bin/tmux-open-yazi.sh"
bind n next-window
bind p previous-window
bind w choose-window
bind q display-panes

# =========================
# Pane 切换（Ctrl-a + , / . — 类比 < >）
# =========================
bind -r , select-pane -t :.-
bind -r . select-pane -t :.+

# =========================
# Pane 大小调整（Ctrl-a + H/J/K/L）
# =========================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================
# 其他实用绑定
# =========================
unbind [
unbind ]
bind [ copy-mode
bind ] paste-buffer
bind '<' swap-pane -t :.-           # 与左 pane 交换
bind '>' swap-pane -t :.+           # 与右 pane 交换
bind '{' swap-pane -U               # 与上 pane 交换
bind '}' swap-pane -D               # 与下 pane 交换
bind 'X' command-prompt -p 'swap pane to:' 'swap-pane -t %%'  # 跨窗口交换
bind E setw synchronize-panes       # 切换同步输入
bind M command-prompt "rename-window '%%'"

# =========================
# 复制模式 & 系统剪切板
# =========================
set -g mode-keys vi
set -g set-clipboard on            # OSC 52 — 支持 Kitty/Ghostty/iTerm2 等
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle
# 解绑默认的单键 '/' 和 '?' 搜索，防止滚轮误入 copy-mode 后打斜杠误触发搜索
unbind -T copy-mode-vi /
unbind -T copy-mode-vi ?
# 改用快捷键 Ctrl-s (向下搜索) 和 Ctrl-r (向上搜索) 触发搜索模式
bind -T copy-mode-vi C-s command-prompt -T search -p "(search down)" { send-keys -X search-forward -- "%%" }
bind -T copy-mode-vi C-r command-prompt -T search -p "(search up)" { send-keys -X search-backward -- "%%" }

# =========================
# 鼠标
# =========================
set -g mouse on



# =========================
# 字符宽度兼容（解决 CJK 溢出问题）
# =========================
set -g wrap-search on
set -g aggressive-resize off

# =========================
# 行为
# =========================
set -g base-index 1
set -g renumber-windows on
# Keep pane titles anchored to tmux defaults set via `select-pane -T`;
# do not let shell/editor OSC title sequences rewrite the first segment.
set -g allow-set-title off
set -g set-titles on
set -g focus-events on
set -g status-interval 5
set -gu update-environment
set -ag update-environment " COLORTERM"

# =========================
# 主题（通过 symlink 管理，运行 switch-theme.sh 切换）
# =========================
if-shell 'test -e ~/.tmux/theme.conf' 'source ~/.tmux/theme.conf'

run '~/.tmux/plugins/tpm/tpm'

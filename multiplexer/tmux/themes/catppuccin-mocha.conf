# Catppuccin Mocha — 柔和低饱和度，长时间看代码不疲劳
# palette: base=#1e1e2e mantle=#181825 crust=#11111b
#          surface0=#313244 surface1=#45475a overlay0=#6c7086
#          text=#cdd6f4 subtext1=#bac2de
#          mauve=#cba6f7 green=#a6e3a1 peach=#fab387
#          sky=#89dceb red=#f38ba8 yellow=#f9e2af blue=#89b4fa

set -g @catppuccin_flavor 'mocha'

# --- status bar ---
set -g status-justify centre
set -g status-style 'fg=#cdd6f4,bg=#1e1e2e'
set -g status-left '#[fg=#a6e3a1,bold] #S #[fg=#6c7086]| #[fg=#fab387]#I:#W '
set -g status-right '#[fg=#89dceb]#{?client_prefix,PREFIX ,}#[fg=#fab387]#{host} #[fg=#6c7086]| #[fg=#cdd6f4]%Y-%m-%d %H:%M '
set -g status-left-length 48
set -g status-right-length 64

# --- window tabs ---
set -g window-status-format ' #I:#W '
set -g window-status-style 'fg=#6c7086,bg=#1e1e2e'
set -g window-status-current-format ' #I:#W #{?window_zoomed_flag, Z,} '
set -g window-status-current-style 'fg=#1e1e2e,bg=#cba6f7,bold'

# --- pane borders ---
set -g pane-border-status top
set -g pane-border-format ' #{?pane_title,#{pane_title},pane-#{pane_index}} | #{pane_current_path} | #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null || git -C "#{pane_current_path}" rev-parse --short HEAD 2>/dev/null || printf "-") '
set -g pane-border-style 'fg=#7f849c,bg=#181825'
set -g pane-active-border-style 'fg=#cba6f7,bg=#181825,bold'
set -g pane-border-lines heavy

# --- window (gap illusion: borders bg darker than pane content bg) ---
set -g window-style 'bg=#1e1e2e'
set -g window-active-style 'bg=#1e1e2e'

# --- misc ---
set -g message-style 'fg=#1e1e2e,bg=#f38ba8,bold'
set -g display-panes-active-colour '#cba6f7'
set -g display-panes-colour '#313244'

# Gruvbox Dark — 经典暖色调，对比度高
# palette: bg0=#282828 bg1=#3c3836 bg2=#504945
#          fg0=#ebdbb2 fg1=#a89984
#          yellow=#fabd2f green=#b8bb26 aqua=#8ec07c orange=#d79921 red=#fe8019

# --- status bar ---
set -g status-justify centre
set -g status-style 'fg=#ebdbb2,bg=#282828'
set -g status-left '#[fg=#b8bb26,bold] #S #[fg=#a89984]| #[fg=#d79921]#I:#W '
set -g status-right '#[fg=#8ec07c]#{?client_prefix,PREFIX ,}#[fg=#d79921]#{host} #[fg=#a89984]| #[fg=#ebdbb2]%Y-%m-%d %H:%M '
set -g status-left-length 48
set -g status-right-length 64

# --- window tabs ---
set -g window-status-format ' #I:#W '
set -g window-status-style 'fg=#a89984,bg=#282828'
set -g window-status-current-format ' #I:#W #{?window_zoomed_flag, Z,} '
set -g window-status-current-style 'fg=#282828,bg=#fabd2f,bold'

# --- pane borders ---
set -g pane-border-status top
set -g pane-border-format ' #{?pane_title,#{pane_title},pane-#{pane_index}} | #{pane_current_path} | #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null || git -C "#{pane_current_path}" rev-parse --short HEAD 2>/dev/null || printf "-") '
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#fabd2f,bold'
set -g pane-border-lines heavy

# --- misc ---
set -g message-style 'fg=#282828,bg=#fe8019,bold'
set -g display-panes-active-colour '#fabd2f'
set -g display-panes-colour '#3c3836'

# =========================
# 基础
# =========================
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color" # Note: If remote hosts do not support tmux-256color (e.g. ancient CentOS), TERM can be overridden to xterm-256color in remote ~/.zshrc. See ~/.ssh/config.d/dsliam for details.
set -ga terminal-overrides ",*256col*:Tc"
set -g allow-passthrough on

# =========================
# 前缀键
# =========================
set -g prefix C-a

# =========================
# 快捷键
# =========================
unbind %
bind-key \\ split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 配合 vim-tmux-navigator（Opt+h/j/k/l 穿透到 vim，避免与 Backspace/C-l 等冲突）
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'M-h' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-h } { select-pane -L } }
bind -n 'M-j' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-j } { select-pane -D } }
bind -n 'M-k' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-k } { select-pane -U } }
bind -n 'M-l' if -F "#{pane_current_command}" { switch-client -n } { if "$is_vim" { send-keys M-l } { select-pane -R } }
bind -n 'M-\' if -F "#{pane_current_command}" { switch-client -n } { select-pane -l }

# =========================
# 缩放 & 窗口
# =========================
bind z resize-pane -Z
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind w choose-window
bind q display-panes

# =========================
# Pane 切换（Ctrl-a + , / . — 类比 < >）
# =========================
bind -r , select-pane -t :.-
bind -r . select-pane -t :.+

# =========================
# Pane 大小调整（Ctrl-a + H/J/K/L）
# =========================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================
# 其他实用绑定
# =========================
unbind [
unbind ]
bind [ copy-mode
bind ] paste-buffer
bind '<' swap-pane -t :.-           # 与左 pane 交换
bind '>' swap-pane -t :.+           # 与右 pane 交换
bind '{' swap-pane -U               # 与上 pane 交换
bind '}' swap-pane -D               # 与下 pane 交换
bind E setw synchronize-panes       # 切换同步输入
bind M command-prompt "rename-window '%%'"

# =========================
# 复制模式 & 系统剪切板
# =========================
set -g mode-keys vi
set -g set-clipboard on            # OSC 52 — 支持 Kitty/Ghostty/iTerm2 等
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# =========================
# 鼠标
# =========================
set -g mouse on

# =========================
# 外观
# =========================
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
set -g focus-events on

# Gruvbox Dark-ish, tuned for readability over flash.
set -g status-interval 5
set -g status-justify centre
set -g status-style 'fg=#ebdbb2,bg=#282828'
set -g status-left '#[fg=#b8bb26,bold] #S #[fg=#a89984]| #[fg=#d79921]#I:#W '
set -g status-right '#[fg=#8ec07c]#{?client_prefix,PREFIX ,}#[fg=#d79921]#{host} #[fg=#a89984]| #[fg=#ebdbb2]%Y-%m-%d %H:%M '
set -g status-left-length 48
set -g status-right-length 64
set -g window-status-format ' #I:#W '
set -g window-status-style 'fg=#a89984,bg=#282828'
set -g window-status-current-format ' #I:#W #{?window_zoomed_flag, Z,} '
set -g window-status-current-style 'fg=#282828,bg=#fabd2f,bold'
set -g pane-border-status top
set -g pane-border-format ' #{pane_current_command} · #{pane_current_path} '
set -g pane-border-style 'fg=#3c3836'
set -g pane-active-border-style 'fg=#fabd2f'
set -g message-style 'fg=#282828,bg=#fe8019,bold'
set -g display-panes-active-colour '#fabd2f'
set -g display-panes-colour '#3c3836'

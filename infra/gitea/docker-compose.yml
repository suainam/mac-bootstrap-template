services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitea
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  gitea:
    image: ${GITEA_IMAGE:-docker.gitea.com/gitea:1.26.2}
    container_name: gitea
    restart: unless-stopped
    depends_on:
      - db
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      GITEA__database__SSL_MODE: disable
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:?GITEA_DOMAIN must be set in .env}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:?GITEA_ROOT_URL must be set in .env}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:?GITEA_SSH_DOMAIN must be set in .env}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__LFS_START_SERVER: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,db,gitea}
    ports:
      - "${GITEA_HTTP_BIND:-0.0.0.0}:${GITEA_HTTP_PORT:-13000}:3000"
      - "${GITEA_SSH_BIND:-0.0.0.0}:${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

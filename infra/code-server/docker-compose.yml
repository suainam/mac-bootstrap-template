services:
    nginx:
        image: nginx:alpine
        container_name: code-server-nginx
        restart: unless-stopped
        ports:
            - "${CODE_SERVER_HTTPS_PORT:-59443}:443"
            - "${CODE_SERVER_HTTP_PORT:-59200}:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./entrypoint-nginx.sh:/entrypoint.sh:ro
            - ${CODE_SERVER_SSL_DIR:-./data/nginx-ssl}:/etc/nginx/ssl
        entrypoint: ["/bin/sh", "/entrypoint.sh"]
        environment:
            CODE_SERVER_CERT_IP: ${CODE_SERVER_CERT_IP:-10.0.103.217}
        depends_on:
            - code-server
        networks:
            - code-server-net

    code-server:
        build: .
        container_name: code-server
        restart: unless-stopped
        user: "0"
        entrypoint: ["/usr/bin/entrypoint.sh"]
        command: ["--bind-addr", "0.0.0.0:8080", "--trusted-origins", "${CODE_SERVER_TRUSTED_ORIGINS:-10.0.103.217:59443}", "."]
        expose:
            - "8080"
        environment:
            PASSWORD: ${CODE_SERVER_PASSWORD:?CODE_SERVER_PASSWORD must be set in .env}
            # OpenAI-compatible proxy → Mac cc-switch via SSH -R tunnel
            OPENAI_API_KEY: ${OPENAI_API_KEY:-placeholder}
            OPENAI_BASE_URL: http://host.docker.internal:15721
            # Claude Code also reads these
            ANTHROPIC_API_KEY: ${OPENAI_API_KEY:-placeholder}
            ANTHROPIC_BASE_URL: http://host.docker.internal:15721
        volumes:
            - ${CODE_SERVER_WORKSPACE_DIR:-/workspace}:/root/dev
            - /var/run/docker.sock:/var/run/docker.sock
            - ${CODE_SERVER_CONFIG_DIR:-./data/config}:/root/.config
            - ${CODE_SERVER_DATA_DIR:-./data/code-server}:/root/.local/share/code-server
        networks:
            - code-server-net
        extra_hosts:
            - "host.docker.internal:host-gateway"
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
        logging:
            driver: json-file
            options:
                max-size: "50m"
                max-file: "5"
        healthcheck:
            test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
            interval: 30s
            timeout: 5s
            start_period: 15s
            retries: 3

networks:
    code-server-net:
